<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday!</title>
  <style>
    body {
      text-align: center;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      background: linear-gradient(to right, #ffdde1, #ee9ca7);
      color: #333;
      margin: 0;
      padding: 0;
    }
    h1 {
      font-size: 50px;
      color: #ff3399;
      margin-top: 50px;
    }
    p {
      font-size: 22px;
      margin: 20px;
    }
    .countdown {
      font-size: 28px;
      color: #222;
      margin-top: 30px;
    }
    img {
      margin-top: 20px;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <h1>🎉 Happy Birthday, [Friend’s Name]! 🎂</h1>
  <p>Wishing you endless joy, laughter, and success. You’re truly special!</p>
  <img src="https://i.imgur.com/4AiXzf8.jpeg" alt="Birthday Cake" width="300">

  <div class="countdown" id="countdown"></div>

  <script>
    // Countdown to midnight today
    const targetDate = new Date();
    targetDate.setHours(23,59,59,999);

    function updateCountdown() {
      const now = new Date();
      const diff = targetDate - now;
      if (diff <= 0) {
        document.getElementById("countdown").innerHTML = "🎁 It's Birthday Time! 🎉";
        return;
      }
      const hours = Math.floor(diff / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((diff % (1000 * 60)) / 1000);
      document.getElementById("countdown").innerHTML =
        `Countdown: ${hours}h ${minutes}m ${seconds}s`;
    }
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
